type Post {
  id: ID!
  title: String!
  content: String!
  published: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!

  author: User!
  comments: [Comment!]!
  likesCount: Int!
  likedByMe: Boolean!
}

type Comment {
  id: ID!
  content: String!
  createdAt: DateTime!
  updatedAt: DateTime!

  author: User!
  post: Post!
}

# ── Inputs ────────────────────────────────

input CreatePostInput {
  title: String!
  content: String!
  published: Boolean
}

input UpdatePostInput {
  title: String
  content: String
  published: Boolean
}

input CreateCommentInput {
  postId: ID!
  content: String!
}

input PostsFilterInput {
  authorId: ID
  published: Boolean
}

# ── Queries & Mutations ───────────────────

type Query {
  post(id: ID!): Post
  posts(filter: PostsFilterInput, pagination: PaginationInput): [Post!]!
  comments(postId: ID!, pagination: PaginationInput): [Comment!]!
}

type Mutation {
  createPost(data: CreatePostInput!): Post!
  updatePost(id: ID!, data: UpdatePostInput!): Post!
  deletePost(id: ID!): Boolean!
  likePost(postId: ID!): Boolean!
  unlikePost(postId: ID!): Boolean!
  createComment(data: CreateCommentInput!): Comment!
  deleteComment(id: ID!): Boolean!
}

# ── Subscriptions ─────────────────────────

type Subscription {
  postCreated: Post!
  postUpdated(id: ID!): Post!
  commentAdded(postId: ID!): Comment!
}