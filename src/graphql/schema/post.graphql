type Post {
  id: ID!
  title: String!
  content: String!
  published: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!

  author: User!
  comments: [Comment!]!
  likesCount: Int!
  likedByMe: Boolean!
}

type Comment {
  id: ID!
  content: String!
  createdAt: DateTime!
  updatedAt: DateTime!

  author: User!
  post: Post!
}

# ── Connection (cursor-based pagination) ──

type PostEdge {
  cursor: String!
  node: Post!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type PostConnection {
  edges: [PostEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

# ── Inputs ────────────────────────────────

input CreatePostInput {
  title: String!
  content: String!
  published: Boolean
}

input UpdatePostInput {
  title: String
  content: String
  published: Boolean
}

input CreateCommentInput {
  postId: ID!
  content: String!
}

# Filtros avançados com AND/OR
input PostWhereInput {
  AND: [PostWhereInput!]
  OR: [PostWhereInput!]
  NOT: PostWhereInput
  title: StringFilterInput
  published: BooleanFilterInput
  authorId: StringFilterInput
}

input StringFilterInput {
  equals: String
  contains: String
  startsWith: String
  endsWith: String
  in: [String!]
}

input BooleanFilterInput {
  equals: Boolean
}

input PostOrderByInput {
  createdAt: SortOrder
  title: SortOrder
  likesCount: SortOrder
}

enum SortOrder {
  asc
  desc
}

input PostsFilterInput {
  authorId: ID
  published: Boolean
}

# ── Queries & Mutations ───────────────────

extend type Query {
  post(id: ID!): Post
  # Query original (offset-based) — mantida para compatibilidade
  posts(filter: PostsFilterInput, pagination: PaginationInput): [Post!]!
  # Nova query com cursor-based pagination e filtros avançados
  postsConnection(
    where: PostWhereInput
    orderBy: PostOrderByInput
    first: Int
    after: String
  ): PostConnection!
  comments(postId: ID!, pagination: PaginationInput): [Comment!]!
}

extend type Mutation {
  createPost(data: CreatePostInput!): Post! @auth
  updatePost(id: ID!, data: UpdatePostInput!): Post! @auth
  deletePost(id: ID!): Boolean! @auth
  likePost(postId: ID!): Boolean! @auth
  unlikePost(postId: ID!): Boolean! @auth
  createComment(data: CreateCommentInput!): Comment! @auth
  deleteComment(id: ID!): Boolean! @auth
}

extend type Subscription {
  postCreated: Post!
  postUpdated(id: ID!): Post!
  commentAdded(postId: ID!): Comment!
}